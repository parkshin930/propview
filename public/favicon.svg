<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 배경 없음(투명). P·V + 캔들만 표시 -->
  <text x="8" y="46" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#333">P</text>
  <text x="34" y="46" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#333">V</text>
  <!-- V 위 캔들스틱: 세로선 + 상·하 wick -->
  <line x1="52" y1="14" x2="52" y2="44" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="14" x2="55" y2="14" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="49.5" y1="32" x2="54.5" y2="32" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
</svg>
